    <style>
    /* OSD ve diğer özel stiller */
    /* Kısayollar accordion dark theme uyumu */
    #shortcutsAccordion .accordion-item {
        border-left: none;
        border-right: none;
        border-top: none;
    }
    #shortcutsAccordion .accordion-button::after {
        filter: invert(1) brightness(0.7);
    }
    #shortcutsAccordion .accordion-button:not(.collapsed) {
        box-shadow: none;
        color: #fff;
    }
    #shortcutsAccordion .accordion-button:focus {
        box-shadow: none;
    }

    #prev_horizon {
        width: 32% !important;
        text-align: center;
    }
    @keyframes blink {
        0% { opacity: 1; }
        50% { opacity: 0; }
        100% { opacity: 1; }
    }
    .osd-monitor-frame {
        border-color: #1a1a1a !important;
        background: #000;
    }
    .osd-element-list::-webkit-scrollbar {
        width: 4px;
    }
    .osd-element-list::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 10px;
    }
    #osd-preview-screen {
        background: yellow;
        background-image: linear-gradient(to bottom, #1a2a3a 0%, #0c0c0c 50%, #2a1a0a 100%);
        border: 5px solid #222 !important;
        position: relative;
    }
    .osd-draggable {
        color: #e0e0e0;
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        text-shadow: 1px 1px 0px #000;
        font-weight: bold;
        font-size: 10px;
        z-index: 5;
        white-space: nowrap;
    }
    .osd-crosshair {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        color: yellow;
        font-size: 24px;
        pointer-events: none;
    }
    </style>
