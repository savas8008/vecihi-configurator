<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0a111c"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#38bdf8" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.15"/>

  <!-- Drone body - center hub -->
  <circle cx="256" cy="256" r="38" fill="#0ea5e9" opacity="0.9"/>
  <circle cx="256" cy="256" r="26" fill="#0a111c"/>
  <circle cx="256" cy="256" r="14" fill="#38bdf8"/>

  <!-- Drone arms - X configuration -->
  <!-- Top-left arm -->
  <line x1="256" y1="256" x2="145" y2="145" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <!-- Top-right arm -->
  <line x1="256" y1="256" x2="367" y2="145" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <!-- Bottom-left arm -->
  <line x1="256" y1="256" x2="145" y2="367" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <!-- Bottom-right arm -->
  <line x1="256" y1="256" x2="367" y2="367" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" opacity="0.8"/>

  <!-- Motor mounts -->
  <circle cx="145" cy="145" r="30" fill="#0f1e30" stroke="#38bdf8" stroke-width="3"/>
  <circle cx="367" cy="145" r="30" fill="#0f1e30" stroke="#38bdf8" stroke-width="3"/>
  <circle cx="145" cy="367" r="30" fill="#0f1e30" stroke="#38bdf8" stroke-width="3"/>
  <circle cx="367" cy="367" r="30" fill="#0f1e30" stroke="#38bdf8" stroke-width="3"/>

  <!-- Propeller blades - Top-left motor (CW) -->
  <ellipse cx="145" cy="145" rx="28" ry="8" fill="#38bdf8" opacity="0.7" transform="rotate(-45 145 145)"/>
  <ellipse cx="145" cy="145" rx="28" ry="8" fill="#38bdf8" opacity="0.7" transform="rotate(45 145 145)"/>

  <!-- Propeller blades - Top-right motor (CCW) -->
  <ellipse cx="367" cy="145" rx="28" ry="8" fill="#10b981" opacity="0.7" transform="rotate(45 367 145)"/>
  <ellipse cx="367" cy="145" rx="28" ry="8" fill="#10b981" opacity="0.7" transform="rotate(-45 367 145)"/>

  <!-- Propeller blades - Bottom-left motor (CCW) -->
  <ellipse cx="145" cy="367" rx="28" ry="8" fill="#10b981" opacity="0.7" transform="rotate(45 145 367)"/>
  <ellipse cx="145" cy="367" rx="28" ry="8" fill="#10b981" opacity="0.7" transform="rotate(-45 145 367)"/>

  <!-- Propeller blades - Bottom-right motor (CW) -->
  <ellipse cx="367" cy="367" rx="28" ry="8" fill="#38bdf8" opacity="0.7" transform="rotate(-45 367 367)"/>
  <ellipse cx="367" cy="367" rx="28" ry="8" fill="#38bdf8" opacity="0.7" transform="rotate(45 367 367)"/>

  <!-- Heading indicator - forward arrow -->
  <polygon points="256,195 244,218 256,210 268,218" fill="#f59e0b" opacity="0.9"/>

  <!-- Signal waves at top -->
  <path d="M226 88 Q256 72 286 88" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M210 74 Q256 52 302 74" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>
